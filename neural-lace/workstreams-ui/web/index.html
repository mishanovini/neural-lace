<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workstreams</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <!-- Workstreams (formerly Conversation Tree) — v2 work-first reframe
       2026-05-30. Left: four-tier Project → Workstream → WorkItem → Sub-task
       hierarchy with focus-project default expansion. Right: filter-driven
       single pane with a detail card on selection. Adjustable divider between
       the two, persisted to localStorage. The GUI is a passive observer
       (ADR-031 Option 2): it reads the file-mediated state via SSE and writes
       GUI mutations as single appended events through POST /api/event. It
       NEVER spawns / feeds / steers a Claude Code session. -->
  <header>
    <h1>Workstreams</h1>
    <label class="archtoggle"><input type="checkbox" id="showCompleted"> show completed</label>
    <label class="archtoggle"><input type="checkbox" id="showArchived"> show archived</label>
    <span class="spacer"></span>
    <button id="docsBtn" class="ghost" title="browse docs across projects">📁 Docs</button>
    <button id="addBacklogBtn" class="btn-info outline" title="capture a not-yet-started work item">+ capture</button>
    <span id="freshness" class="freshness" aria-live="polite" title="How recently the state file changed AND when the heartbeat last ran. Red if heartbeat is stale (&gt;10min).">—</span>
    <span id="status" class="status" aria-live="polite">connecting…</span>
  </header>

  <!-- Global corruption banner (UX-I4 / C1d). -->
  <div id="corruptBanner" class="banner corrupt" role="alert" hidden></div>
  <!-- Transient saved/error feedback. -->
  <div id="toast" class="toast" role="status" hidden></div>

  <main id="layout">
    <!-- LEFT: four-tier hierarchy. Project (proj-* roots) → Workstream →
         WorkItem → Sub-task. Sessions (sess-*) are NEVER rendered as their own
         row — they surface only as provenance in the detail card. Focus
         project expanded; others collapsed. "Orphans this week" section at the
         bottom surfaces in-flight work that isn't moving. -->
    <section id="treePane" class="pane tree-pane" aria-label="workstreams hierarchy">
      <div class="pane-head">
        <span class="pane-title">Projects</span>
        <span id="treeSummary" class="crumb" aria-live="polite"></span>
      </div>
      <div id="treeScroll" class="pane-body tree-scroll">
        <div id="treeCanvas" class="tree-canvas"></div>
        <div id="orphanSection" class="orphan-section" hidden>
          <div class="orphan-head" title="Dispatch sessions that opened but were never concluded (>24h). Internal sub-agent sessions are excluded.">⚠️ Stale sessions <span id="orphanCount" class="count-badge"></span></div>
          <div id="orphanBody" class="orphan-body"></div>
        </div>
      </div>
      <div id="treeState" class="pane-state" hidden></div>
    </section>

    <!-- Adjustable divider — drag to resize the two panes; width persists to
         localStorage (key: workstreams.paneSplit). -->
    <div id="divider" class="divider" role="separator" aria-orientation="vertical"
         aria-label="resize panes" tabindex="0" title="drag to resize (← / → with keyboard)"></div>

    <!-- RIGHT: filter-driven single pane. The filter chips replace the old
         stacked Waiting/Backlog/Decisions/Questions accordion. Selecting an
         item replaces the filtered list with a detail card; deselecting
         restores the list. Default filter = "Awaiting me" with non-complete
         states only (shipped/closed hidden until "All" or "Recently shipped"). -->
    <aside id="sidePanel" class="side-panel" aria-label="filtered work items">
      <div id="filterBar" class="filter-bar" role="tablist" aria-label="work item filters">
        <button class="chip" data-filter="in-flight"      role="tab" title="Work in motion — building / running / awaiting verification, tracked toward deployed">In flight <span class="chip-count" data-count="in-flight">0</span></button>
        <button class="chip" data-filter="awaiting-me"   role="tab" title="The bounded global list — every item that needs YOUR decision / answer / action, plus blocked work">Waiting on you <span class="chip-count" data-count="awaiting-me">0</span></button>
        <button class="chip" data-filter="blocked"        role="tab" title="Work stopped on a dependency / missing input">Blocked <span class="chip-count" data-count="blocked">0</span></button>
        <button class="chip" data-filter="shipped-not-deployed" role="tab" title="Merged / shipped but NOT yet live in production — every effort that hasn't reached deployed">Shipped · not deployed <span class="chip-count chip-warn" data-count="shipped-not-deployed">0</span></button>
        <button class="chip" data-filter="deployed"       role="tab" title="Live in production — fully done">Deployed <span class="chip-count" data-count="deployed">0</span></button>
        <button class="chip" data-filter="orphaned"       role="tab" title="Dispatch sessions never concluded (>24h); internal sub-agent sessions excluded">Stale sessions <span class="chip-count chip-warn" data-count="orphaned">0</span></button>
        <button class="chip" data-filter="recently-shipped" role="tab" title="Shipped in the last 7 days">Recently shipped <span class="chip-count" data-count="recently-shipped">0</span></button>
        <button class="chip" data-filter="my-tasks"       role="tab" title="Your hand-authored task list — add / edit / reorder / complete / remove">My tasks <span class="chip-count" data-count="my-tasks">0</span></button>
        <button class="chip" data-filter="backlog"        role="tab" title="Captured but not yet started">Backlog <span class="chip-count" data-count="backlog">0</span></button>
        <button class="chip" data-filter="all"            role="tab" title="Every work item across all projects">All <span class="chip-count" data-count="all">0</span></button>
      </div>

      <!-- Inline capture form for new backlog items (toggled by + capture). -->
      <div id="backlogCapture" class="capture" hidden>
        <input id="blText" type="text" placeholder="What's the not-yet-started work?" aria-label="backlog item text">
        <textarea id="blContext" placeholder="context — what you know, why it matters, related docs (multi-line)" aria-label="context note"></textarea>
        <div class="capture-row">
          <select id="blPriority" aria-label="priority">
            <option value="high">high</option>
            <option value="medium" selected>medium</option>
            <option value="low">low</option>
          </select>
          <button id="blSave" class="btn-go">Add</button>
          <button id="blCancel" class="btn-neutral outline">cancel</button>
        </div>
      </div>

      <div id="filterBody" class="pane-body list-body" aria-live="polite"></div>
      <div id="filterState" class="pane-state" hidden></div>
    </aside>
  </main>

  <!-- Item DETAIL MODAL (Phase D, 2026-06-09). Replaces the prior right-pane
       detailCard that filled the side panel. Selecting a work item now opens
       this dismissible modal OVERLAY in front of everything (click-scrim / Esc
       to close); the filter list stays put behind it. Carries the full
       self-contained context (Background / the ask / Options / Recommendation /
       Links — the Phase-C `details` payload) plus context-appropriate action
       buttons (approve / decline / submit-a-decision for decisions; mark-done
       for actions; and ALWAYS a respond-with-details / ask-clarifying-question
       affordance) wired to the answered / action-done / action-responded /
       item-details-set lifecycle events via POST /api/event. -->
  <div id="detailScrim" class="modal-scrim" hidden></div>
  <div id="detailModal" class="modal-card detail-modal" hidden role="dialog"
       aria-label="work item detail" aria-modal="true">
    <div class="dm-head">
      <span id="dmTitle" class="dm-title">work item</span>
      <button id="dmClose" class="ghost dm-close" title="close (Esc)">✕</button>
    </div>
    <div id="dmBody" class="dm-body"></div>
    <div id="dmActions" class="dm-actions"></div>
  </div>

  <!-- Cross-project docs browser (restored 2026-06-02 — bug #6). Shared scrim
       for the drawer + the doc viewer modal. /api/docs, /api/doc, /api/doc/open
       endpoints are live in server.js. -->
  <div id="docScrim" class="modal-scrim" hidden></div>
  <aside id="docsPanel" hidden aria-label="docs browser">
    <div class="dp-head">
      <input id="docsFilter" type="text" placeholder="filter by filename…" aria-label="filter docs">
      <button id="docsClose" class="ghost" title="close">✕</button>
    </div>
    <div class="dp-body" id="docsBody"></div>
  </aside>
  <div id="docModal" class="modal-card doc-modal" hidden role="dialog" aria-label="document viewer" aria-modal="true">
    <div class="doc-head">
      <span class="doc-title" id="docTitle">document</span>
      <button id="docOpenEditor" class="ghost" title="open in your OS default editor">⧉ Open in editor</button>
      <button id="docClose" class="ghost" title="close (Esc)">✕</button>
    </div>
    <div class="doc-body" id="docBody"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
