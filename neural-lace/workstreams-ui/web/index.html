<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workstreams</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <!-- Workstreams cockpit — cockpit-roadmap-redesign Task 3 "Roadmap tree
       view + the navigation shell" (C2): ONE registry, THREE views, ONE
       navigation shell. Tabs: Roadmap (the LANDING tab — the glance
       surface), Requests (the conversation/intent ledger; interim content =
       the existing ask tree until task 5 rebuilds it), Inbox (N) (live
       ANSWERABLE-only count — I4/A10; interim answerable list until task 4
       ships the full context-contract view), and Harness Health (kept —
       the six wave-O panes stay quarantined in <template
       id="harnessHealthTemplate"> below, inert until app.js's
       initHarnessHealthTab() clones it in on first open). Hash addressing:
       #roadmap/<id> / #request/<id> / #inbox/<id> — every cross-view link
       switches tab + scrolls + expands + highlights + moves focus; Back
       (hashchange) + an explicit return affordance restore the prior tab
       with expansion + scroll intact; a followed link to a resolved item
       renders "resolved <when> — <outcome>", never blank (C3). -->
  <header>
    <h1>Workstreams</h1>
    <nav id="tabNav" class="tab-nav" role="tablist" aria-label="workstreams views">
      <button type="button" id="tabRoadmapBtn" class="tab-btn" role="tab"
              aria-selected="true" aria-controls="tabRoadmapPanel">Roadmap</button>
      <button type="button" id="tabRequestsBtn" class="tab-btn" role="tab"
              aria-selected="false" aria-controls="tabRequestsPanel">Requests</button>
      <button type="button" id="tabInboxBtn" class="tab-btn" role="tab"
              aria-selected="false" aria-controls="tabInboxPanel">Inbox <span id="inboxTabCount">(—)</span></button>
      <button type="button" id="tabHealthBtn" class="tab-btn" role="tab"
              aria-selected="false" aria-controls="tabHealthPanel">Harness Health</button>
    </nav>
    <span class="spacer"></span>
    <button id="docsBtn" class="ghost" title="browse docs across projects">📁 Docs</button>
  </header>

  <!-- ============================================================
       TAB 1 — Roadmap (the landing tab). Rendered by web/roadmap.js from
       GET /api/roadmap (server/roadmap-routes.js). The toolbar controls
       live HERE (static DOM) so filter text + toggle state trivially
       survive the view's state-preserving re-renders (C7).
       ============================================================ -->
  <div id="tabRoadmapPanel" class="tab-panel" role="tabpanel" aria-labelledby="tabRoadmapBtn">
    <section id="roadmapSection" class="pane roadmap-section" aria-label="roadmap">
      <div class="roadmap-toolbar">
        <input id="roadmapFilter" type="text" placeholder="filter the roadmap…"
               aria-label="filter roadmap items (matches titles, requests, and ids)">
        <div id="roadmapProjectChips" class="rm-project-chips" role="group" aria-label="project filters"></div>
        <button type="button" id="roadmapChoreToggle" class="ghost small" aria-pressed="false">harness chores</button>
        <button type="button" id="roadmapKanbanToggle" class="ghost small" aria-pressed="false">Kanban</button>
        <span class="pane-age" data-age-for="roadmap">—</span>
      </div>
      <div id="roadmapMissBanner" class="miss-banner" hidden></div>
      <div class="pane-body roadmap-body" id="roadmapBody"></div>
    </section>
  </div>

  <!-- ============================================================
       TAB 2 — Requests (the conversation/intent ledger). INTERIM CONTENT:
       the ask-rooted-workstreams-p1 ask tree + sidebar, UNCHANGED (asks are
       requests — same registry; task 5 rebuilds this view's anatomy:
       evolution timeline, findability, close-on-promote). The shell's
       #request/<id> addressing lands on the ask cards below.
       ============================================================ -->
  <div id="tabRequestsPanel" class="tab-panel" hidden role="tabpanel" aria-labelledby="tabRequestsBtn">
    <div id="requestsMissBanner" class="miss-banner" hidden></div>
    <div class="ws-layout">
      <section id="askTreeSection" class="ask-tree-section" aria-label="requests">
        <div class="ask-tree-head">
          <h2 class="ask-tree-title">Requests</h2>
        </div>
        <div class="ask-tree-body" id="askTreeBody"></div>
      </section>

      <!-- Column resize handle (cockpit-roadmap-redesign Task 8, absorbed
           UI-polish item 1): drag OR arrow-keys widen/narrow the sidebar
           against the requests column; wired by app.js's own separate,
           additive IIFE (does not touch the tab-shell code above it).
           ARIA "window splitter" pattern (role=separator, keyboard
           alternative to the pointer drag per WCAG 2.2 SC 2.5.7). -->
      <div id="colResizeHandle" class="resize-handle resize-handle-col" role="separator"
           aria-orientation="vertical" aria-label="resize requests and sidebar columns"
           tabindex="0"></div>

      <aside id="sidebarSection" class="sidebar" aria-label="to-do and backlog">
        <section id="todoSection" class="pane todo-section" aria-label="my to-do">
          <div class="pane-head">
            <span class="pane-title">My To-Do</span>
            <span class="todo-count" id="todoCount" aria-live="off">—</span>
          </div>
          <div class="pane-body todo-body" id="todoBody"></div>
        </section>

        <!-- Row resize handle: drag OR arrow-keys resize the My To-Do pane's
             own scroll height against Backlog below it — each pane body
             then scrolls INDEPENDENTLY (own overflow-y:auto) rather than
             only the whole sidebar scrolling as one unit. -->
        <div id="rowResizeHandle" class="resize-handle resize-handle-row" role="separator"
             aria-orientation="horizontal" aria-label="resize my to-do and backlog panes"
             tabindex="0"></div>

        <section id="backlogSection" class="pane backlog-section" aria-label="backlog">
          <div class="pane-head">
            <span class="pane-title">Backlog</span>
            <span class="backlog-count" id="backlogCount" aria-live="off">—</span>
          </div>
          <div class="pane-body backlog-body" id="backlogBody"></div>
        </section>
      </aside>
    </div>
  </div>

  <!-- ============================================================
       TAB 3 — Inbox (everything waiting on the operator). INTERIM CONTENT
       (task 3): the ANSWERABLE items list rendered by app.js from the SAME
       needs-me derivation the Harness Health Q2 pane reads — quarantined
       (context-less) items are EXCLUDED from both the list and the tab
       count (I4) and remain visible in Harness Health until task 4 ships
       the full context-contract view (quarantine section, §3 anatomy,
       lifecycle verbs, "My items"). Task 4 REGISTERS its view here via
       WorkstreamsShell.registerView('inbox', ...), replacing app.js's
       interim renderer.
       ============================================================ -->
  <div id="tabInboxPanel" class="tab-panel" hidden role="tabpanel" aria-labelledby="tabInboxBtn">
    <section id="inboxSection" class="pane inbox-section" aria-label="inbox — waiting on you">
      <div class="pane-head">
        <span class="pane-title">Inbox — waiting on you</span>
        <span class="pane-age" data-age-for="inbox">—</span>
      </div>
      <div id="inboxMissBanner" class="miss-banner" hidden></div>
      <div class="pane-body inbox-body" id="inboxBody"></div>
    </section>
  </div>

  <!-- ============================================================
       TAB 4 — Harness Health. Mount point (empty until first activation)
       + the inert <template> carrying the six wave-O panes VERBATIM, plus
       the reconciler badge, interrupt strip, why-drawer, and a new
       Diagnostics section (auditor + reconciler internals — "Diagnostics
       ... live here too", Task 16). No Team tab ships in P1 (review
       round 1 — no empty shell surfaces): there is no nav entry, no
       markup, nothing to hide — it simply was never built here.
       ============================================================ -->
  <div id="tabHealthPanel" class="tab-panel" hidden role="tabpanel" aria-labelledby="tabHealthBtn"></div>

  <template id="harnessHealthTemplate">
    <div class="hh-toolbar">
      <button id="refreshBtn" class="ghost" title="force a refresh of every pane now">⟳ Refresh</button>
      <span id="refreshFeedback" class="refresh-feedback" aria-live="polite"></span>
      <!-- O.4-fix1 item 4 (keyboard-only FAIL): the drift-badge mismatch
           detail used to live ONLY in a hover title= tooltip, unreachable by
           keyboard/AT users. <details>/<summary> is natively focusable +
           keyboard-activatable (Enter/Space toggles, no JS needed for the
           open/close mechanic itself) and gives every mismatch its own
           visible text row instead of a tooltip. reconcilerBadge (id kept
           for existing hooks/tests) is now the <summary>; the mismatch list
           renders into #reconcilerDisclosureBody by renderBadgeDisclosure(). -->
      <details id="reconcilerDetails" class="reconciler-details" aria-live="polite">
        <summary id="reconcilerBadge" class="reconciler-badge"
                  title="derived-vs-displayed drift check — click/Enter for details">reconciler: checking…</summary>
        <div id="reconcilerDisclosureBody" class="reconciler-disclosure-body"></div>
      </details>
    </div>

    <!-- Interrupt-priority strip (specs-o §O.4.3b — BINDING: on cold load,
         WAITING-ON-ME session rows sort above all other states and open
         NEEDS-YOU entries render above Q3/Q4/Q5, both inside the initial
         viewport, with ONE accent color spent only on interrupt-worthy
         classes). Populated by renderInterruptStrip() in app.js from the
         SAME od_sessions/od_needs_me data the Q1/Q2 panes render below —
         it is a re-sorted VIEW of that data, not a separate source. -->
    <div id="interruptStrip" class="interrupt-strip" aria-live="polite"></div>

    <main id="cockpit">
      <!-- Q2 — WHAT NEEDS ME. Sorted first per ux-review amendment 9
           (attention-semantics: "Q2 on top"). READ-ONLY: renders the §3-format
           block inline; the link-resolver handles every link; NO action
           buttons (Q2 v1 disposition). -->
      <section id="paneNeedsMe" class="pane pane-needs-me" aria-label="what needs me">
        <div class="pane-head">
          <span class="pane-title">2 · What needs me</span>
          <span class="pane-age" data-age-for="needs-me">—</span>
        </div>
        <div class="pane-body" id="needsMeBody"></div>
      </section>

      <!-- Q1 — WHAT'S RUNNING. Session board with state chips; stalled/crashed/
           waiting-on-me sorted first per ux-review amendment 9. -->
      <section id="paneStatus" class="pane pane-status" aria-label="what's running">
        <div class="pane-head">
          <span class="pane-title">1 · What's running</span>
          <span class="pane-age" data-age-for="status">—</span>
        </div>
        <div class="pane-body" id="statusBody"></div>
      </section>

      <!-- Q4 — IS THE HARNESS WORKING. Compact strip. -->
      <section id="paneHealth" class="pane pane-health" aria-label="is the harness working">
        <div class="pane-head">
          <span class="pane-title">4 · Harness health</span>
          <span class="pane-age" data-age-for="health">—</span>
        </div>
        <div class="pane-body" id="healthBody"></div>
      </section>

      <!-- Q5 — WHAT'S IT COSTING. Compact strip. -->
      <section id="paneCosts" class="pane pane-costs" aria-label="what's it costing">
        <div class="pane-head">
          <span class="pane-title">5 · What's it costing</span>
          <span class="pane-age" data-age-for="costs">—</span>
        </div>
        <div class="pane-body" id="costsBody"></div>
      </section>

      <!-- Q3 — WHAT HAPPENED (diff-since-last-look). Last-look anchor is
           explicit + a Mark-seen control (ux-review amendment 3). -->
      <section id="paneShipped" class="pane pane-shipped" aria-label="what happened since your last look">
        <div class="pane-head">
          <span class="pane-title">3 · What happened</span>
          <span class="pane-age" data-age-for="shipped">—</span>
        </div>
        <div class="last-look-row">
          <span id="lastLookAnchor" class="last-look-anchor"></span>
          <button id="markSeenBtn" class="ghost small">Mark seen</button>
        </div>
        <div class="pane-body" id="shippedBody"></div>
      </section>

      <!-- Backlog health strip (od_backlog_health — not one of the six sketch
           questions, same CANONICAL-COUNTERS-01 discipline). -->
      <section id="paneBacklog" class="pane pane-backlog" aria-label="backlog health">
        <div class="pane-head">
          <span class="pane-title">Backlog health</span>
          <span class="pane-age" data-age-for="backlog">—</span>
        </div>
        <div class="pane-body" id="backlogHealthBody"></div>
      </section>
    </main>

    <!-- Diagnostics — reconciler/auditor internals ("Diagnostics
         (reconciler internals, drift detail) live here too", Task 16). NOT
         schema-validated like /api/asks (server.js's own header comment on
         /api/diagnostics/drift): this is the diagnostics-tab surface the
         anti-noise law explicitly scopes OUT of (constraint 1 governs the
         LANDING payload/DOM only). Loaded once when this tab first opens. -->
    <section id="diagnosticsSection" class="pane diagnostics-section" aria-label="diagnostics">
      <div class="pane-head">
        <span class="pane-title">Diagnostics — auditor + reconciler internals</span>
      </div>
      <div class="pane-body" id="diagnosticsBody"></div>
    </section>

    <!-- Q6 — WHY DID X HAPPEN. On-demand drawer, opened from a session row's
         "Why" affordance (interaction table, ux-review amendment 8).
         tabindex="-1" (O.4-fix1 item 4 — keyboard-only FAIL): the drawer is
         not part of the normal tab order (it's not an input), but MUST be
         programmatically focusable so app.js's whyDrawer.focus() on open
         actually moves focus into the role=dialog per WCAG 2.2 §2.4.11 /
         standard modal-dialog focus-management convention. Without
         tabindex, .focus() silently no-ops on a plain <div>, which is
         exactly the defect the acceptance drill's keyboard-only pass
         caught (focus never left the invoking "Why?" button). -->
    <div id="whyScrim" class="modal-scrim" hidden></div>
    <div id="whyDrawer" class="modal-card why-drawer" hidden role="dialog" aria-label="why drawer" aria-modal="true" tabindex="-1">
      <div class="dm-head">
        <span id="whyTitle" class="dm-title">why</span>
        <button id="whyClose" class="ghost dm-close" title="close (Esc)" aria-label="close why drawer">✕</button>
      </div>
      <div id="whyBody" class="dm-body"></div>
    </div>
  </template>

  <!-- Docs browser (KEPT — the ONE link-resolver backend per ux-review
       amendment 6: no pane grows its own link handling). GLOBAL — shared by
       BOTH tabs (asks.js's plan-doc drill-down reuses this same modal), so
       it stays outside the Harness Health template and is wired immediately
       at page load, not lazily. -->
  <div id="docScrim" class="modal-scrim" hidden></div>
  <aside id="docsPanel" hidden aria-label="docs browser">
    <div class="dp-head">
      <input id="docsFilter" type="text" placeholder="filter by filename…" aria-label="filter docs">
      <button id="docsClose" class="ghost" title="close" aria-label="close docs browser">✕</button>
    </div>
    <div class="dp-body" id="docsBody"></div>
  </aside>
  <div id="docModal" class="modal-card doc-modal" hidden role="dialog" aria-label="document viewer" aria-modal="true">
    <div class="doc-head">
      <span class="doc-title" id="docTitle">document</span>
      <button id="docOpenEditor" class="ghost" title="open in your OS default editor">⧉ Open in editor</button>
      <button id="docClose" class="ghost" title="close (Esc)" aria-label="close document viewer">✕</button>
    </div>
    <div class="doc-body" id="docBody"></div>
  </div>

  <script src="/asks.js"></script>
  <script src="/todo.js"></script>
  <script src="/backlog.js"></script>
  <script src="/app.js"></script>
  <!-- roadmap.js loads AFTER app.js: it registers into the shell API
       (window.WorkstreamsShell) app.js defines. Served by
       server/roadmap-routes.js (the one-line server.js mount). -->
  <script src="/roadmap.js"></script>
  <script src="/requests.js"></script>
</body>
</html>
