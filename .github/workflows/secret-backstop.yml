name: Secret scan CI backstop

# SECRET-SCAN-CI-BACKSTOP-01 (docs/backlog.md; F.3 decision 2, 2026-07-06).
#
# `git push --no-verify` bypasses the LOCAL pre-push credential scan by git
# design (documented in adapters/claude-code/manifest.json's
# `secret-hygiene-prepush` entry; see also
# adapters/claude-code/tests/fixtures/wave-f/F.5/waiver-parity-audit.md row 25,
# which flagged this as an open security question). The operator's F.3
# disposition was ACCEPT-DOCUMENTED (--no-verify stays available, git-native,
# per §9 of the constitution) ON CONDITION that a genuine server-side
# backstop exists so a bypassed local scan cannot ship a secret to the
# remote unnoticed. This workflow is that backstop.
#
# PROVENANCE — this workflow does NOT fork or duplicate the pattern list.
# It re-invokes the EXISTING scanner scripts directly, so the patterns stay
# single-sourced:
#   - adapters/claude-code/hooks/pre-push-scan.sh
#       (built-in credential regexes: AWS, GitHub, Stripe, Slack, OpenAI,
#       Anthropic, JWTs, PEM keys, etc. — see BUILTIN_PATTERNS in that file)
#   - adapters/claude-code/hooks/harness-hygiene-scan.sh
#       (adapters/claude-code/patterns/harness-denylist.txt — business
#       identifiers, known test-credential strings, generic secret shapes)
#
# RELATIONSHIP TO server-side-enforcement.yml — that workflow's
# `credential-scan` and `harness-hygiene` jobs already invoke these same two
# scripts against push/PR diffs (added independently, pre-F.3). This
# workflow is deliberately a SEPARATE file (per the backlog item's explicit
# ask) so the secret-scanning backstop has its own named, independently
# reviewable CI surface + branch-protection required-check, rather than
# living as two jobs inside a differently-scoped workflow. Both workflows
# calling the same underlying scripts is intentional defense-in-depth, not
# drift — if one workflow file is ever removed or misconfigured, the other
# still catches the diff.
#
# ORACLE (per the backlog entry): a seeded fixture secret in a test branch
# must turn this workflow RED; a normal branch's diff must stay GREEN.
# Verified locally (cannot run Actions live from this environment) via
# adapters/claude-code/tests/secret-backstop-fixture-check.sh — see that
# script's header for the exact planted-fixture / clean-diff scenarios and
# how to re-run them.

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  credential-and-denylist-scan:
    name: Credential + hygiene-denylist scan (defense-in-depth backstop)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository (full history for diff range)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure git identity (pre-push-scan.sh shells out to git)
        run: |
          git config --global user.email "ci@neural-lace.invalid"
          git config --global user.name  "Neural Lace CI"

      - name: Determine diff range (base..head)
        id: range
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            # Push event: diff against the immediate previous commit.
            base_sha="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse --verify HEAD)"
            head_sha="${GITHUB_SHA}"
          fi
          if [[ -z "$base_sha" ]] || [[ -z "$head_sha" ]]; then
            echo "::error::could not determine base..head range (base=$base_sha head=$head_sha)"
            exit 1
          fi
          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "Diff range: $base_sha..$head_sha"
          git log --oneline "$base_sha".."$head_sha" | head -20 || true

      - name: Run pre-push-scan.sh credential patterns on the diff range
        id: credential_scan
        shell: bash
        env:
          BASE_SHA: ${{ steps.range.outputs.base_sha }}
          HEAD_SHA: ${{ steps.range.outputs.head_sha }}
        run: |
          set -uo pipefail
          # pre-push-scan.sh reads stdin in git pre-push format:
          #   <local_ref> <local_sha> <remote_ref> <remote_sha>
          # local_sha = head of the diff (what's being pushed/proposed);
          # remote_sha = base (what the remote already has), so the scanner
          # walks exactly the commits this push/PR would introduce.
          local_ref="refs/heads/${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          remote_ref="refs/heads/${GITHUB_BASE_REF:-master}"
          line="${local_ref} ${HEAD_SHA} ${remote_ref} ${BASE_SHA}"
          echo "Synthesized stdin: $line"
          set +e
          printf '%s\n' "$line" | bash adapters/claude-code/hooks/pre-push-scan.sh origin "https://github.com/${GITHUB_REPOSITORY}.git"
          code=$?
          set -e
          if [[ $code -ne 0 ]]; then
            echo "::error::pre-push-scan.sh blocked the diff (exit $code) — credential pattern match detected. This is the CI backstop for --no-verify bypasses (SECRET-SCAN-CI-BACKSTOP-01); a local bypass does NOT protect the remote."
            exit "$code"
          fi
          echo "credential pattern scan: PASS"

      - name: Run harness-hygiene-scan.sh denylist on changed files
        id: hygiene_scan
        shell: bash
        env:
          BASE_SHA: ${{ steps.range.outputs.base_sha }}
          HEAD_SHA: ${{ steps.range.outputs.head_sha }}
        run: |
          set -uo pipefail
          mapfile -t changed < <(git diff --name-only --diff-filter=AM "${BASE_SHA}..${HEAD_SHA}" 2>/dev/null || true)
          if [[ ${#changed[@]} -eq 0 ]]; then
            echo "no added/modified files in diff range — nothing to scan"
            exit 0
          fi
          echo "Files to scan (${#changed[@]}):"
          printf '  %s\n' "${changed[@]}"
          set +e
          bash adapters/claude-code/hooks/harness-hygiene-scan.sh "${changed[@]}"
          code=$?
          set -e
          if [[ $code -ne 0 ]]; then
            echo "::error::harness-hygiene-scan.sh blocked the diff (exit $code) — denylist (credential-shape or business-identifier) match in added/modified files. CI backstop for --no-verify bypasses (SECRET-SCAN-CI-BACKSTOP-01)."
            exit "$code"
          fi
          echo "hygiene denylist scan: PASS"
