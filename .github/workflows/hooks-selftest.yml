name: Hooks self-test

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  hooks:
    name: Bash hooks --self-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show shell + tool versions
        run: |
          bash --version | head -1
          git --version
          jq --version

      # Hooks routinely shell out to `git`; some self-tests `git init` a
      # temporary repo and then commit/push. A configured identity prevents
      # spurious failures inside those sub-repos.
      - name: Configure git identity (required by some hook self-tests)
        run: |
          git config --global user.email "ci@neural-lace.invalid"
          git config --global user.name  "Neural Lace CI"

      - name: Discover hooks with --self-test support
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          # A hook "supports --self-test" if the literal token appears in
          # its source. We use this same heuristic in the local devloop.
          mapfile -t hooks < <(
            grep -lZ -- "--self-test" adapters/claude-code/hooks/*.sh 2>/dev/null \
              | tr '\0' '\n'
          )
          printf '%s\n' "${hooks[@]}" > /tmp/hook-list.txt
          wc -l < /tmp/hook-list.txt | tr -d ' ' > /tmp/hook-count.txt
          echo "Found $(cat /tmp/hook-count.txt) hooks with --self-test support"

      - name: Run --self-test on every supporting hook
        shell: bash
        run: |
          set -uo pipefail
          # Known-failing hooks. When the eats-own-cooking workflow first
          # landed (2026-05-23) it surfaced these as pre-existing
          # self-test failures that local sweeps had been missing. Each
          # entry MUST cite a tracking issue / backlog entry. Move entries
          # OUT of this list once the underlying self-test is fixed.
          #
          # 2026-05-23 — INITIAL discoveries from the first-ever CI run of
          # this workflow (PR #28). Both hooks pass when run from a local
          # working tree that has accumulated state from prior sessions;
          # both fail cold in CI. Tracked in PR #28 body + the rot
          # surfaced is itself the value the eats-own-cooking arc provides.
          #
          # 2026-05-28 — REBASE discovery (replacement PR for #28). The hook
          # conversation-tree-extract-pending.sh was added to the repo AFTER
          # the original PR #28 was authored. Its --self-test exhibits the
          # same accumulated-state-vs-cold-CI gap as its conv-tree siblings
          # (EX1 / FN1 / ID1 / FP3 / ML1 / LG1 cases all fail cold). Same
          # mitigation pattern: allowlist with a tracking pointer; the fix
          # is a separate follow-up that makes the self-test self-contained.
          KNOWN_FAILING_HOOKS=(
            "conversation-tree-emit.sh"
            "conversation-tree-extract-pending.sh"
            "tool-call-budget.sh"
          )

          is_known_failing() {
            local target="$1"
            local k
            for k in "${KNOWN_FAILING_HOOKS[@]}"; do
              [[ "$k" == "$target" ]] && return 0
            done
            return 1
          }

          pass=0
          fail=0
          allowed_failing_count=0
          failed_hooks=()
          allowed_failing=()
          while IFS= read -r hook; do
            [[ -z "$hook" ]] && continue
            name="$(basename "$hook")"
            echo "::group::$name"
            # Some hooks expect to be cwd'd at the repo root; we already are.
            # Capture output so a failing hook surfaces its diagnostic.
            if output="$(bash "$hook" --self-test 2>&1)"; then
              printf '%s\n' "$output"
              pass=$((pass + 1))
              echo "::endgroup::"
            else
              code=$?
              printf '%s\n' "$output"
              echo "::endgroup::"
              if is_known_failing "$name"; then
                echo "::warning file=$hook::Hook self-test failed (exit $code) — listed in KNOWN_FAILING_HOOKS allowlist; tracked for fix"
                allowed_failing+=("$name (exit $code)")
                allowed_failing_count=$((allowed_failing_count + 1))
              else
                echo "::error file=$hook::Hook self-test FAILED (exit $code)"
                fail=$((fail + 1))
                failed_hooks+=("$name (exit $code)")
              fi
            fi
          done < /tmp/hook-list.txt

          echo
          echo "Hook self-test suite: $pass passed, $fail failed, $allowed_failing_count allowed-failing"
          if [[ ${#allowed_failing[@]} -gt 0 ]]; then
            echo "Allowed-failing (tracked — see KNOWN_FAILING_HOOKS in this workflow):"
            for ah in "${allowed_failing[@]}"; do
              echo "  - $ah"
            done
          fi
          if [[ $fail -gt 0 ]]; then
            echo "Newly-failing hooks (not in allowlist — FIX or add to KNOWN_FAILING_HOOKS with a tracking reference):"
            for fh in "${failed_hooks[@]}"; do
              echo "  - $fh"
            done
            exit 1
          fi

  test-scripts:
    name: Standalone test scripts (adapters/claude-code/tests/*.sh)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure git identity
        run: |
          git config --global user.email "ci@neural-lace.invalid"
          git config --global user.name  "Neural Lace CI"

      - name: Run *.sh tests under adapters/claude-code/tests/
        shell: bash
        run: |
          set -uo pipefail
          shopt -s nullglob
          tests=(adapters/claude-code/tests/*.sh)
          if [[ ${#tests[@]} -eq 0 ]]; then
            echo "no standalone test scripts found"
            exit 0
          fi
          # Known-failing tests. Same convention as KNOWN_FAILING_HOOKS
          # above. Move entries OUT once the underlying test is fixed.
          #
          # 2026-05-23 — INITIAL discoveries from first-ever CI run. Both
          # are integration-test orchestrators that run multiple harness
          # components together and have pre-existing sub-test failures
          # surfaced by the cold CI environment (e.g., tool-call-budget
          # N6 hard-ceiling, plan-edit-validator summary-match drift,
          # spawn-validator audit-flag I1/I4). Each warrants its own
          # follow-up PR; the value of this workflow is making the rot
          # visible at all.
          KNOWN_FAILING_TESTS=(
            "acceptance-loop-self-test.sh"
            "agent-teams-self-test.sh"
          )

          is_known_failing_test() {
            local target="$1"
            local k
            for k in "${KNOWN_FAILING_TESTS[@]}"; do
              [[ "$k" == "$target" ]] && return 0
            done
            return 1
          }

          pass=0
          fail=0
          allowed_failing_count=0
          failed=()
          allowed_failing=()
          for t in "${tests[@]}"; do
            name="$(basename "$t")"
            echo "::group::$name"
            if bash "$t"; then
              pass=$((pass + 1))
              echo "::endgroup::"
            else
              code=$?
              echo "::endgroup::"
              if is_known_failing_test "$name"; then
                echo "::warning file=$t::Standalone test failed (exit $code) — listed in KNOWN_FAILING_TESTS allowlist; tracked for fix"
                allowed_failing+=("$name (exit $code)")
                allowed_failing_count=$((allowed_failing_count + 1))
              else
                echo "::error file=$t::Test FAILED (exit $code)"
                fail=$((fail + 1))
                failed+=("$name (exit $code)")
              fi
            fi
          done
          echo
          echo "Standalone tests: $pass passed, $fail failed, $allowed_failing_count allowed-failing"
          if [[ ${#allowed_failing[@]} -gt 0 ]]; then
            echo "Allowed-failing (tracked — see KNOWN_FAILING_TESTS in this workflow):"
            for ah in "${allowed_failing[@]}"; do
              echo "  - $ah"
            done
          fi
          if [[ $fail -gt 0 ]]; then
            echo "Newly-failing tests (not in allowlist — FIX or add to KNOWN_FAILING_TESTS with a tracking reference):"
            for f in "${failed[@]}"; do
              echo "  - $f"
            done
            exit 1
          fi
