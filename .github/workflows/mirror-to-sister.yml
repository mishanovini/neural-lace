# Mirror master to the sister Neural Lace repo (cross-repo mirror automation).
#
# Deployed IDENTICALLY to both repos. Repo identity is NOT hardcoded — it lives in
# the per-repo Actions variable `SISTER_REPO` (e.g. "owner/neural-lace") so the
# committed file stays identity-free (harness-hygiene) and one file serves both repos.
#
# STAGED, NOT ENABLED until the unification cutover (ADR 044 / plan
# docs/plans/neural-lace-mirror-automation.md). Even if this branch is pushed, the
# `push: branches: [master]` trigger does not fire on a feature branch — it only
# activates once merged to master.
#
# Setup (cutover runbook): set repo variable SISTER_REPO + secret MIRROR_PAT
# (fine-grained PAT, Contents:write on the SISTER repo only; for a protected sister
# master the PAT's account must be in the branch-protection bypass-allowances).
# Optional alerting: secret NTFY_URL + variable NTFY_TOPIC.
name: Mirror master to sister repo

on:
  push:
    branches: [master]

# Serialize mirror runs within THIS repo so back-to-back merges queue instead of racing.
concurrency:
  group: mirror-master
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for fast-forward push)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror pushed SHA to sister master (fast-forward only)
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
          SISTER_REPO: ${{ vars.SISTER_REPO }}
          PUSHED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${SISTER_REPO}" ]; then
            echo "::error::SISTER_REPO variable not set — cannot mirror."; exit 1
          fi
          if [ -z "${MIRROR_PAT}" ]; then
            echo "::error::MIRROR_PAT secret not set — cannot mirror."; exit 1
          fi

          # actions/checkout@v4 default behavior sets a global http extraheader
          # using GITHUB_TOKEN that takes precedence over URL-embedded credentials.
          # Drop it explicitly so the MIRROR_PAT we embed in the sister URL is the
          # credential actually used for the cross-repo push. (`persist-credentials:
          # false` on the checkout step would also work but escalates the orphan-
          # gitlinks-without-.gitmodules warning to a fatal checkout failure on this
          # repo — see gh run 26591831908; backlog HARNESS-GAP for the orphan
          # gitlinks cleanup is the proper long-term fix.)
          git config --local --unset-all 'http.https://github.com/.extraheader' 2>/dev/null || true

          # Token is embedded in the URL; GitHub Actions masks the raw secret in logs.
          # We never run `set -x`, so the URL line is not echoed.
          SISTER_URL="https://x-access-token:${MIRROR_PAT}@github.com/${SISTER_REPO}.git"

          # 1. Read the sister's current master SHA.
          SISTER_SHA="$(git ls-remote "${SISTER_URL}" refs/heads/master | awk '{print $1}')"
          echo "pushed=${PUSHED_SHA} sister=${SISTER_SHA:-<empty>}"

          # 2. Equal -> no-op. This is also the LOOP-BREAK: a PAT push to the sister
          #    triggers the sister's own run, which sees sister==pushed and exits here.
          if [ "${SISTER_SHA}" = "${PUSHED_SHA}" ]; then
            echo "already in sync; no-op."
            exit 0
          fi

          # 3. Sister already AHEAD (our pushed SHA is an ancestor of the sister tip) ->
          #    benign rapid-succession case. The newer SHA's run re-converges. No-op,
          #    NOT a failure (avoids false-alarm red runs on back-to-back merges).
          if [ -n "${SISTER_SHA}" ]; then
            git fetch --no-tags "${SISTER_URL}" "+refs/heads/master:refs/remotes/sister/master"
            if git merge-base --is-ancestor "${PUSHED_SHA}" refs/remotes/sister/master; then
              echo "sister is ahead (pushed SHA is an ancestor); benign no-op."
              exit 0
            fi
          fi

          # 4. Fast-forward push. NEVER --force. A non-fast-forward update (true
          #    concurrent divergence, OR a merge commit hitting a linear-history-protected
          #    master) is REJECTED by the receiving repo -> this step fails -> the run goes
          #    red -> alert. No auto-resolve: a human reconciles (see plan runbook).
          echo "pushing ${PUSHED_SHA} to ${SISTER_REPO} master (fast-forward only)..."
          git push "${SISTER_URL}" "${PUSHED_SHA}:refs/heads/master"
          echo "mirrored ${PUSHED_SHA} to sister master."

      - name: Alert on failure (optional ntfy; GitHub native failure email is the floor)
        if: failure()
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
          NTFY_TOPIC: ${{ vars.NTFY_TOPIC }}
        run: |
          set -u
          if [ -n "${NTFY_URL:-}" ] && [ -n "${NTFY_TOPIC:-}" ]; then
            curl -fsS -m 5 \
              -H "Title: NL mirror DESYNC" \
              -d "mirror-to-sister FAILED on ${GITHUB_REPOSITORY}@${GITHUB_SHA} (run ${GITHUB_RUN_ID}). Manual reconciliation likely required." \
              "${NTFY_URL%/}/${NTFY_TOPIC}" || echo "ntfy POST failed (non-fatal)."
          else
            echo "ntfy not configured (NTFY_URL secret / NTFY_TOPIC var absent); relying on GitHub native failure notification."
          fi
